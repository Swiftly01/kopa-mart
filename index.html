<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kopamart — Buy &amp; Sell in Nigeria</title>
    <meta
      name="description"
      content="A trusted kopa marketplace . Anyone can buy; this is a platform to support the youth"
    />
    <meta name="author" content="Kopa Marketplace" />
    <meta name="theme-color" content="#1a7a3a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kopa" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://storage.googleapis.com/gpt-engineer-file-uploads/n3zO3SSfQjbuE3OJnpTxSnEohPZ2/social-images/social-1778273461249-kopa_logo.webp"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta
      name="twitter:image"
      content="https://storage.googleapis.com/gpt-engineer-file-uploads/n3zO3SSfQjbuE3OJnpTxSnEohPZ2/social-images/social-1778273461249-kopa_logo.webp"
    />

    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff;
        gap: 12px;
      }
      .dark #preloader {
        background: #0f1f14;
      }
      #preloader img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        animation: pulse-logo 1.5s ease-in-out infinite;
      }
      #preloader .pl-name {
        font-size: 18px;
        font-weight: 700;
        color: #1a7a3a;
        font-family: system-ui, sans-serif;
      }
      #preloader .pl-tag {
        font-size: 12px;
        color: #6b7280;
        font-family: system-ui, sans-serif;
      }
      @keyframes pulse-logo {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.06);
          opacity: 0.85;
        }
      }
    </style>
    <meta
      property="og:title"
      content="Kopa Marketplace — Buy &amp; Sell in Nigeria"
    />
    <meta
      name="twitter:title"
      content="Kopa Marketplace — Buy &amp; Sell in Nigeria"
    />
    <meta
      property="og:description"
      content="A trusted kopa marketplace . Anyone can buy; this is a platform to support the youth"
    />
    <meta
      name="twitter:description"
      content="A trusted kopa marketplace . Anyone can buy; this is a platform to support the youth"
    />
  </head>
  <body>
    <div id="preloader">
      <img src="/pwa-192.png" alt="Kopa" />
      <span class="pl-name">Kopa Marketplace</span>
      <span class="pl-tag">Supporting the youth</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
